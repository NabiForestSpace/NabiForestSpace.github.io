<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Augenblick & Plunderteilchen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0e6;
            color: #3d2b1f;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            margin: 40px 0 20px;
        }
        .content {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Augenblick & Plunderteilchen</h1>
    
    <div class="content">
        <p>Manchmal braucht es nur einen kleinen Augenblick – mit einer Tasse Kaffee, einem Plunderteilchen und dem Gefühl, dass das Leben gerade ein bisschen innehält.</p>
    </div>

    <div class="content">
        <p><strong>Bald mehr.</strong> Du bist herzlich willkommen.</p>
    </div>
</body>
</html>
